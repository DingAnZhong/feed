app:
  name: "feed-system"
  port: 8083
  env: "dev"
  # 大 V 阈值（粉丝数超过此值降级为拉模式）
  huge_user_follower_threshold: 10000
  # 推拉结合模式配置
  pull_mode:
    enabled: true
    huge_user_threshold: 1000
    popular_post_threshold: 1000
  # 本地缓存配置
  local_cache:
    enabled: true
    ttl_seconds: 30
    max_items: 10000
    empty_cache_ttl_seconds: 5

auth:
  jwt_secret: "seckill_super_secret_key_2026"
  token_ttl: "2h"
  refresh_token_ttl: "720h"  # 7天

log:
  level: "debug"
  mode: "dev"
  filename: "./log/app.log"
  max_size: 100
  max_backups: 10
  max_age: 7

mysql:
  dsn: "root:123456@tcp(127.0.0.1:13306)/feed_db?charset=utf8mb4&parseTime=True&loc=Local"
  max_open_conns: 100
  max_idle_conns: 20

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  pool_size: 100

kafka:
  brokers:
    - "127.0.0.1:9092"
  topic_feed: "feed"